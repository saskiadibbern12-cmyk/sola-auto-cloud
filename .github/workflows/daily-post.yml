name: SOLA Instagram Auto-Post

on:
  schedule:
    # UTC. CEST=UTC+2. 6 Laeufe/Tag: je Slot + Catch-up ~3h spaeter, off-peak Minute :09 gegen GitHub-Cron-Stau.
    # Poster postet den AELTESTEN faelligen Post (ein Post/Lauf) -> ein Catch-up holt einen verpassten Slot auf.
    - cron: '9 6 * * *'    # ~08:09 CEST  Slot A (Wert/Hook)
    - cron: '9 9 * * *'    # ~11:09 CEST  Catch-up A
    - cron: '9 11 * * *'   # ~13:09 CEST  Slot B (Produkt-Hero)
    - cron: '9 14 * * *'   # ~16:09 CEST  Catch-up B
    - cron: '9 16 * * *'   # ~18:09 CEST  Slot C (Mood/Editorial)
    - cron: '9 20 * * *'   # ~22:09 CEST  Catch-up C
  workflow_dispatch:
    inputs:
      force_id:
        description: 'Post-id sofort testen (z.B. 2), leer = normaler Faelligkeits-Lauf'
        required: false
        default: ''

permissions:
  contents: write   # damit der Workflow den posted-Status zurueck committen darf

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post faelligen Slot
        id: post
        continue-on-error: true
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FORCE_ID: ${{ github.event.inputs.force_id }}
          WINDOW_MIN: '150'
        run: python3 scripts/post-instagram.py

      - name: Zustand zurueck committen (posted/error)
        if: always()
        run: |
          git config user.name "sola-bot"
          git config user.email "actions@github.com"
          git add queue.json || true
          git commit -m "state: posted update [skip ci]" || echo "keine Aenderung"
          git push || echo "nichts zu pushen"

      - name: Fehler weiterreichen (loest GitHub-Fehlermail aus)
        if: steps.post.outcome == 'failure'
        run: |
          echo "::error::Instagram-Post fehlgeschlagen, siehe queue.json error-Feld + Log"
          exit 1
